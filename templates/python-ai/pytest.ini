[pytest]
asyncio_mode = auto
# python_classes must list every category class name used in .grader/checks/.
# pytest's default only collects classes prefixed with "Test".
# If you add a new category class (e.g. class Security:), add it here AND
# add its point value to CATEGORY_POINTS in .grader/summarize.py.
python_classes = Structure Execution Quality Test*
# testpaths is not set here — grade.yml passes the path explicitly:
#   pytest .grader/checks/ --json-report ...
# Running pytest from repo root without arguments will not collect checks by design.
